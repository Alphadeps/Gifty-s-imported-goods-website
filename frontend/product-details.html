<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Product Details - Atsupi's Cosmetics</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#F5F2EE">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Leckerli+One&display=swap"
        rel="stylesheet">

    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet" />

    <!-- FontAwesome for Social Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="styles.css">
    <style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined' !important;
            font-feature-settings: 'liga';
            -webkit-font-feature-settings: 'liga';
        }
        main {
            min-height: 80vh;
        }
    </style>
</head>

<body class="theme-light">
    <!-- Header Component -->
    <app-header></app-header>

    <main>
        <!-- Product Details Section -->
        <section class="product-details-section">
            <div class="details-container fade-in-up">

                <!-- Product Image Gallery -->
                <div class="details-image-col">
                    <div class="main-image-wrapper">
                        <img src="" alt="Product loading..." class="main-detail-image" id="product-main-image">
                    </div>
                </div>

                <!-- Product Info & Actions -->
                <div class="details-info-col" style="animation-delay: 0.2s">
                    <nav class="breadcrumb" id="product-breadcrumb">
                        <a href="index.html">Home</a>
                        <span>/</span>
                        <a href="products.html">Catalog</a>
                        <span>/</span>
                        <span id="breadcrumb-current">...</span>
                    </nav>

                    <h1 class="details-title" id="product-title">Loading...</h1>
                    <p class="details-price" id="product-price">₵0.00</p>

                    <div class="details-description" id="product-description">
                        <p>Loading product details...</p>
                    </div>

                    <!-- Highlights / Attributes -->
                    <div class="product-highlights">
                        <h3 class="section-subtitle">Highlights</h3>
                        <ul id="product-features" class="features-grid"></ul>
                    </div>

                    <!-- Buy Action -->
                    <div class="details-actions">
                        <a href="#" target="_blank" class="primary-btn buy-btn group" id="buy-whatsapp-btn">
                            <span class="btn-text">Buy via WhatsApp</span>
                            <i class="fa-brands fa-whatsapp"></i>
                        </a>
                        <p class="delivery-note">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 4px;">
                                <rect x="1" y="3" width="15" height="13"></rect>
                                <polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon>
                                <circle cx="5.5" cy="18.5" r="2.5"></circle>
                                <circle cx="18.5" cy="18.5" r="2.5"></circle>
                            </svg>
                            Nationwide Delivery Available
                        </p>
                    </div>
                </div>

            </div>

            <!-- Related Products -->
            <div class="related-products-section fade-in-up" style="animation-delay: 0.4s">
                <div class="section-header">
                    <h2 class="section-title">You May Also Like</h2>
                    <div class="section-divider"></div>
                </div>
                <div class="product-grid" id="related-products-grid">
                    <!-- Loaded via JS -->
                </div>
            </div>
        </section>
    </main>

    <!-- Footer Component -->
    <app-footer></app-footer>

    <!-- Components and App Logic -->
    <script src="components/header.js"></script>
    <script src="components/footer.js"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>

</html>
