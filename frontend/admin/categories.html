<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Gifty's Admin - Categories</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2D3B2D",
                        "background-light": "#F5F2EE",
                        "background-dark": "#112111",
                        "surface": "#ffffff",
                        "surface-dark": "#1a261a",
                        "text-main": "#1A1412",
                        "text-main-dark": "#f5f2ee",
                        "muted": "#8A837E",
                        "muted-dark": "#a39b95",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"],
                        "serif": ["Playfair Display", "serif"]
                    },
                    borderRadius: {
                        "card": "16px",
                        "btn": "12px",
                    }
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Public Sans', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined' !important;
            font-feature-settings: 'liga';
            -webkit-font-feature-settings: 'liga';
        }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-text-main dark:text-text-main-dark antialiased min-h-screen pb-24">
    <div class="w-full max-w-4xl mx-auto flex flex-col relative px-4 sm:px-8">
        
        <!-- Header -->
        <header class="py-12 flex items-center justify-between">
            <div>
                <h1 class="font-serif text-[40px] font-semibold">Categories</h1>
                <p class="text-muted text-sm mt-1 uppercase tracking-widest font-bold">Catalogue Organization</p>
            </div>
            <a href="products.html" class="flex items-center gap-2 px-6 py-3 rounded-xl bg-surface dark:bg-surface-dark border border-muted/20 hover:border-primary transition-all text-sm font-bold">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"></path>
                    <path d="m3.3 7 8.7 5 8.7-5"></path>
                    <path d="M12 22V12"></path>
                </svg>
                <span>Back to Products</span>
            </a>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8 items-start">
            <!-- Category List -->
            <main class="md:col-span-2 space-y-4" id="categories-list">
                <div id="loading" class="flex justify-center py-10 text-muted">
                    <svg class="animate-spin h-8 w-8 text-primary" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </div>
            </main>

            <!-- Add Category Form -->
            <aside class="bg-white dark:bg-surface-dark p-8 rounded-3xl shadow-xl border border-muted/10 sticky top-12">
                <h3 class="text-lg font-bold mb-6 font-serif">Add New Category</h3>
                <div class="space-y-4">
                    <div class="flex flex-col">
                        <label class="text-xs font-bold text-muted uppercase mb-2 ml-1">Name</label>
                        <input type="text" id="new-category-name" placeholder="e.g. Skin Care" 
                               class="w-full h-12 px-4 rounded-xl border border-muted/20 dark:bg-background-dark focus:ring-2 focus:ring-primary/20 focus:border-primary font-medium">
                    </div>
                    <button onclick="handleAdd()" class="w-full h-14 bg-primary text-white rounded-xl flex items-center justify-center gap-2 active:scale-95 shadow-lg shadow-primary/20 font-bold transition-all">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        <span>Create Category</span>
                    </button>
                </div>
            </aside>
        </div>

        <!-- Mobile Floating Navigation (Redundant but kept for parity) -->
        <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md border-t border-muted/10 px-8 py-3 flex justify-around items-center z-50">
            <a href="products.html" class="flex flex-col items-center gap-1 text-muted">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m7.5 4.27 9 5.15"></path>
                    <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"></path>
                    <path d="m3.3 7 8.7 5 8.7-5"></path>
                    <path d="M12 22V12"></path>
                </svg>
                <span class="text-[10px] font-bold uppercase tracking-wider">Products</span>
            </a>
            <a href="categories.html" class="flex flex-col items-center gap-1 text-primary">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
                <span class="text-[10px] font-bold uppercase tracking-wider">Categories</span>
            </a>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config.js"></script>
    <script src="admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await auth.init();
            fetchCategories();
        });
        async function fetchCategories() {
            const list = document.getElementById('categories-list');
            try {
                // Show skeletons while loading
                list.innerHTML = getSkeletonHTML('list', 4);

                // Categories use the admin endpoint for deletion
                const response = await adminFetch('/categories');
                if (!response) return;
                const categories = await response.json();
                
                // document.getElementById('loading').remove(); // Removed as skeletons are now used

                if (categories.length === 0) {
                    list.innerHTML = `<p class="text-center text-muted py-10 italic">No categories created yet.</p>`;
                    return;
                }

                list.innerHTML = categories.map(cat => `
                    <div class="flex items-center justify-between p-4 bg-surface dark:bg-surface-dark rounded-xl shadow-sm border border-muted/5">
                        <span class="font-medium">\${cat.name}</span>
                        <button onclick="handleDelete('\${cat.id}')" class="text-red-400 hover:text-red-600 transition-colors">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="3 6 5 6 21 6"></polyline>
                                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                <line x1="10" y1="11" x2="10" y2="17"></line>
                                <line x1="14" y1="11" x2="14" y2="17"></line>
                            </svg>
                        </button>
                    </div>
                `).join('');
            } catch (error) {
                console.error(error);
            }
        }

        async function handleAdd() {
            const nameInput = document.getElementById('new-category-name');
            const name = nameInput.value.trim();
            if (!name) return;

            try {
                const response = await adminFetch('/categories', {
                    method: 'POST',
                    body: JSON.stringify({ name })
                });

                if (response && response.ok) {
                    nameInput.value = '';
                    showToast('Category added');
                    fetchCategories();
                } else {
                    showToast('Failed to add category', 'error');
                }
            } catch (error) {
                showToast('API Error', 'error');
            }
        }

        async function handleDelete(id) {
            if (!confirm('Are you sure? This might affect products in this category.')) return;
            try {
                const response = await adminFetch('/categories', {
                    method: 'DELETE',
                    body: JSON.stringify({ id })
                });
                if (response && response.ok) {
                    showToast('Category removed');
                    fetchCategories();
                }
            } catch (error) {
                showToast('API Error', 'error');
            }
        }

        // Initialize call moved to listener above
    </script>
</body>
</html>
