<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Gifty's Admin - Products</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Playfair+Display:wght@500;600&display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2D3B2D",
                        "background-light": "#F5F2EE",
                        "background-dark": "#112111",
                        "surface": "#ffffff",
                        "surface-dark": "#1a261a",
                        "text-main": "#1A1412",
                        "text-main-dark": "#f5f2ee",
                        "muted": "#8A837E",
                        "muted-dark": "#a39b95",
                        "accent": "#ec5b13",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"],
                        "serif": ["Playfair Display", "serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.375rem",
                        "card": "16px",
                        "btn": "12px",
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Public Sans', sans-serif;
        }

        .font-serif {
            font-family: 'Playfair Display', serif;
        }

        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined' !important;
            font-feature-settings: 'liga';
            -webkit-font-feature-settings: 'liga';
        }

        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-text-main dark:text-text-main-dark antialiased min-h-screen pb-24">
    <div class="w-full max-w-6xl mx-auto flex flex-col relative px-4 sm:px-6">

        <!-- Header -->
        <header class="flex items-center justify-between py-6">
            <h1 class="font-serif text-3xl font-semibold">Products Dashboard</h1>
            <div class="flex gap-4">
                <a href="categories.html"
                    class="hidden sm:flex items-center gap-2 px-4 py-2 rounded-lg bg-surface dark:bg-surface-dark border border-muted/20 hover:border-primary transition-colors">
                    <span class="material-symbols-outlined">&#xe574;</span>
                    <span class="text-sm font-semibold">Categories</span>
                </a>
                <a href="login.html"
                    class="flex items-center gap-2 px-6 py-3 rounded-xl bg-surface dark:bg-surface-dark border border-muted/20 hover:border-accent hover:text-accent transition-all text-sm font-bold">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    <span>Logout</span>
                </a>
            </div>
        </header>

        <!-- Search and Filter Bar -->
        <div class="mb-8 flex flex-col sm:flex-row gap-4 justify-between items-center">
            <div class="relative w-full max-w-md">
                <span
                    class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-muted">&#xe8b6;</span>
                <input type="text" id="search-input" placeholder="Search products..."
                    class="w-full h-12 pl-10 pr-4 rounded-xl border-none bg-surface dark:bg-surface-dark shadow-sm focus:ring-2 focus:ring-primary/20">
            </div>
            <a href="add-edit-product.html"
                class="flex items-center gap-2 px-6 py-3 bg-primary text-white rounded-xl shadow-lg hover:bg-primary/90 transition-all font-semibold">
                <span class="material-symbols-outlined">&#xe145;</span>
                <span>Add New Product</span>
            </a>
        </div>

        <!-- Scrollable List / Grid -->
        <main class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="products-list">
            <!-- Loading State -->
            <div id="loading" class="col-span-full flex flex-col items-center justify-center py-20 text-muted">
                <span class="material-symbols-outlined animate-spin text-4xl mb-2">&#xe052;</span>
                <p>Loading catalog...</p>
            </div>

            <!-- Product items will be injected here -->
        </main>

        <!-- Mobile Floating Navigation (Hidden on large screens or redundant) -->
        <nav
            class="md:hidden fixed bottom-0 left-0 right-0 bg-background-light/95 dark:bg-background-dark/95 backdrop-blur-md border-t border-muted/10 px-8 py-3 flex justify-around items-center z-50">
            <a href="products.html" class="flex flex-col items-center gap-1 text-primary">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="m7.5 4.27 9 5.15"></path>
                    <path
                        d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z">
                    </path>
                    <path d="m3.3 7 8.7 5 8.7-5"></path>
                    <path d="M12 22V12"></path>
                </svg>
                <span class="text-[10px] font-bold uppercase tracking-wider">Products</span>
            </a>
            <a href="categories.html" class="flex flex-col items-center gap-1 text-muted">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
                <span class="text-[10px] font-bold uppercase tracking-wider">Categories</span>
            </a>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../config.js"></script>
    <script src="admin.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await auth.init();
            fetchProducts();
        });
        async function fetchProducts() {
            const listContainer = document.getElementById('products-list');
            const loading = document.getElementById('loading');

            try {
                // Show skeletons while fetch occurs (if re-enabled)
                listContainer.innerHTML = getSkeletonHTML('card', 6);

                const response = await adminFetch('/products');
                if (!response) return;
                
                const products = await response.json();
                loading.remove();

                if (products.length === 0) {
                    listContainer.innerHTML = `
                        <div class="flex flex-col items-center justify-center py-20 text-muted">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="mb-2">
                                <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"></path>
                                <path d="m3.3 7 8.7 5 8.7-5"></path>
                                <path d="M12 22V12"></path>
                            </svg>
                            <p>No products yet.</p>
                        </div>
                    `;
                    return;
                }

                listContainer.innerHTML = products.map(product => `
                    <div class="bg-surface dark:bg-surface-dark p-3 rounded-card shadow-card flex items-center gap-4 group active:scale-[0.98] transition-transform">
                        <div class="w-16 h-16 rounded-lg bg-background-light dark:bg-background-dark overflow-hidden flex-shrink-0">
                            <img src="${product.image_urls?.[0] || '../placeholder.jpg'}" alt="${product.name}" class="w-full h-full object-cover">
                        </div>
                        <div class="flex-1 min-w-0">
                            <h3 class="font-semibold text-[15px] truncate">${product.name}</h3>
                            <p class="text-xs text-muted dark:text-muted-dark">${product.category_name || 'Uncategorized'}</p>
                            <div class="flex justify-between items-center mt-1">
                                <span class="font-bold text-primary">₵${product.current_price}</span>
                                <span class="text-[10px] px-2 py-0.5 rounded-full ${product.available ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                    ${product.available ? 'In Stock' : 'Out of Stock'}
                                </span>
                            </div>
                        </div>
                        <div class="flex flex-col gap-2">
                            <a href="add-edit-product.html?id=${product.id}" class="w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-400">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                    <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                </svg>
                            </a>
                            <button onclick="handleDelete('${product.id}')" class="w-8 h-8 rounded-full bg-red-50 dark:bg-red-900/20 flex items-center justify-center text-red-500">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <polyline points="3 6 5 6 21 6"></polyline>
                                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                    <line x1="10" y1="11" x2="10" y2="17"></line>
                                    <line x1="14" y1="11" x2="14" y2="17"></line>
                                </svg>
                            </button>
                        </div>
                    </div>
                `).join('');

            } catch (error) {
                console.error('Error:', error);
                loading.innerHTML = `<p class="text-red-500">Failed to load products. Check connection.</p>`;
            }
        }

        async function handleDelete(id) {
            if (!confirm('Are you sure you want to delete this product?')) return;

            try {
                const response = await adminFetch('/products', {
                    method: 'DELETE',
                    body: JSON.stringify({ id })
                });

                if (response && response.ok) {
                    showToast('Product deleted successfully');
                    fetchProducts();
                } else {
                    showToast('Failed to delete product', 'error');
                }
            } catch (error) {
                showToast('Error deleting product', 'error');
            }
        }

        // Initialize call moved to DOMContentLoaded listener above
    </script>
</body>

</html>
