<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contact Us - Atsupi's Cosmetics Trading</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#E6CEB8">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Leckerli+One&display=swap"
        rel="stylesheet">

    <!-- Material Symbols -->
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0&display=swap"
        rel="stylesheet" />

    <link rel="stylesheet" href="styles.css">
    <style>
        main {
            min-height: 80vh;
        }
    </style>
</head>

<body class="theme-light">
    <!-- Header Component -->
    <app-header></app-header>

    <main>
        <!-- Location & Contact Section -->
        <section class="contact-section" id="contact" style="padding-top: var(--space-xl);">
            <div class="section-header fade-in-up">
                <h3 class="section-title">Visit Us</h3>
                <p class="section-subtitle">Experience the radiance in person.</p>
            </div>

            <div class="contact-grid">
                <!-- Contact Methods & Form -->
                <div class="contact-card fade-in-up" style="animation-delay: 0.1s">
                    <form class="inquiry-form" onsubmit="event.preventDefault(); alert('Message sent successfully!');">
                        <h4 class="form-title">Send an Inquiry</h4>
                        <div class="input-group">
                            <input type="text" id="name" placeholder="Your Name" required>
                        </div>
                        <div class="input-group">
                            <input type="tel" id="phone" placeholder="Phone Number" required>
                        </div>
                        <div class="input-group">
                            <input type="email" id="email" placeholder="Email Address" required>
                        </div>
                        <div class="input-group">
                            <textarea id="message" rows="3" placeholder="How can we help?" required></textarea>
                        </div>
                        <button type="submit" class="submit-btn" style="width:100%;">Send Message</button>
                    </form>
                </div>

                <!-- Contact Methods moved out of card -->
                <div class="contact-methods-wrapper fade-in-up" style="animation-delay: 0.15s">
                    <div class="action-buttons">
                        <a href="tel:0595812257" class="btn-action call-btn">
                            <span class="material-symbols-outlined">call</span>
                            Call
                        </a>
                        <a href="https://wa.me/233595812257" target="_blank" class="btn-action wa-btn">
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                                <path
                                    d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.888-.788-1.489-1.761-1.663-2.06-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01h-.57c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z" />
                            </svg>
                            WhatsApp
                        </a>
                    </div>
                </div>
                </div>

                <!-- Google Maps Embed Placehoder -->
                <div class="map-container fade-in-up" style="animation-delay: 0.2s">
                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15881.332304850403!2d-0.198308!3d5.584348!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xfdf9a9a0b0b0b0b%3A0xb0b0b0b0b0b0b0b!2sAccra%2C%20Ghana!5e0!3m2!1sen!2sus!4v1614123456789!5m2!1sen!2sus"
                        width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy">
                    </iframe>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer Component -->
    <app-footer></app-footer>

    <!-- Components and App Logic -->
    <script src="components/header.js"></script>
    <script src="components/footer.js"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>

</html>
